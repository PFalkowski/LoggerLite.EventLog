name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore LoggerLite.EventLog/LoggerLite.EventLog.csproj
      - name: Build
        run: dotnet build LoggerLite.EventLog/LoggerLite.EventLog.csproj --no-restore
      - name: Restore test
        run: dotnet restore LoggerLite.EventLog.UnitTest/LoggerLite.EventLog.UnitTest.csproj
      - name: Build test
        run: dotnet build LoggerLite.EventLog.UnitTest/LoggerLite.EventLog.UnitTest.csproj --no-restore
      - name: Test
        run: dotnet test LoggerLite.EventLog.UnitTest/LoggerLite.EventLog.UnitTest.csproj --no-build
